name: PR Quality Checks

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened]

jobs:
  conventional-commits-pr-title:
    name: Conventional Commit PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows Conventional Commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The PR subject "{subject}" must start with a lowercase letter.

  no-merge-conflicts:
    name: No Merge Conflicts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for merge conflict markers
        run: |
          if git diff --name-only origin/main...HEAD | xargs grep -l "<<<<<<< " 2>/dev/null; then
            echo "❌ Merge conflict markers found. Resolve them before merging."
            exit 1
          else
            echo "✅ No merge conflict markers found."
          fi

  file-size-check:
    name: File Size Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check no large files (>5MB)
        run: |
          find . -not -path './.git/*' -not -path './frontend/node_modules/*' -not -path './backend/node_modules/*' -size +5M | while read f; do
            echo "❌ Large file detected: $f"
            exit 1
          done
          echo "✅ No large files detected."
